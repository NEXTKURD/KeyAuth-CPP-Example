name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

            - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # بکارئینانا لینکەکێ دی یێ SDK یێ پشتڕاستکری
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip sdks.zip
          mkdir -p $THEOS/sdks
          mv sdks-master/*.sdk $THEOS/sdks/
          rm -rf sdks-master sdks.zip
