name: Build iOS Dylib
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and Compile
        run: |
          # ئەڤ دێرە دێ گەڕیێت ل فایلێ main.cpp و هەمی فایلێن دی یێن پێدڤی
          MAIN_FILE=$(find . -name "main.cpp" | head -n 1)
          if [ -z "$MAIN_FILE" ]; then
            MAIN_FILE=$(find . -name "*.cpp" | head -n 1)
          fi
          
          echo "Found main file: $MAIN_FILE"
          
          xcrun -sdk iphoneos clang++ -arch arm64 -shared -std=c++11 \
          -w -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          "$MAIN_FILE" -o MyMod.dylib || echo "Failed but continuing..."

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: My-iPhone-Dylib
          path: "*.dylib"
          if-no-files-found: error
