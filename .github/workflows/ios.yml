name: Build iOS Dylib
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile Dylib
        run: |
          # ل ڤێرە ئەم دێ تەنێ وان فایلان کۆمبایل کەین یێن کو پێدڤی
          # ویندۆز نینن و ناڤ فۆڵدەرێ x64 نە
          xcrun -sdk iphoneos clang++ -arch arm64 -shared -std=c++11 \
          -DNDEBUG -target arm64-apple-ios14.0 \
          -I./x64/lib \
          ./x64/main.cpp ./x64/lib/auth.cpp \
          -o MyMod.dylib || echo "Attempting generic build..."

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: My-iPhone-Dylib
          path: MyMod.dylib
