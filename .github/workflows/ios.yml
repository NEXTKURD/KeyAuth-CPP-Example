name: Build iOS Dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mkdir -p $THEOS/sdks
          mv sdks-master/*.sdk $THEOS/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # ئەگەر ناڤێ پڕۆژەی MyKeyAuth بیت، دێ ب ڤی شێوەی بیت
          make clean
          make FINALPACKAGE=1

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: My-iPhone-Dylib
          path: |
            .theos/obj/debug/*.dylib
            .theos/obj/*.dylib
            packages/*.deb
